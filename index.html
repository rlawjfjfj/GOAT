<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* CSS: 기본 여백 제거 및 전체 화면 사용 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        }

        /* 2분할 레이아웃을 위한 Flexbox 설정 */
        .container {
            display: flex;
            height: 100vh;
        }

        /* 왼쪽 패널 (탭 + 검색창 + 리스트) */
        .left-panel {
            width: 350px;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 2;
        }

        /* 탭 버튼 디자인 */
        .tabs {
            display: flex;
            background-color: #fff;
            border-bottom: 1px solid #ddd;
        }
        .tab-btn {
            flex: 1;
            padding: 15px 0;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: bold;
            color: #888;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            color: #333;
        }
        .tab-btn.active {
            color: #000;
            border-bottom: 3px solid #fee500; /* 활성화된 탭 하단 노란색 선 */
        }

        /* 검색 박스 디자인 */
        .search-box {
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        .search-box button {
            padding: 10px 15px;
            background-color: #fee500;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .search-box button:hover {
            background-color: #f4dc00;
        }

        /* 검색 결과 리스트 디자인 */
        .result-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .result-list li {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .result-list li:hover {
            background-color: #e9ecef;
        }

        .result-list h5 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: #333;
        }

        .result-list p {
            margin: 0 0 5px 0;
            font-size: 13px;
            color: #666;
        }

        .result-list .phone {
            color: #28a745;
        }

        /* 오른쪽 패널 (지도) */
        .right-panel {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* 정보창(상세 팝업) 디자인 */
        .info-window {
            padding: 15px;
            min-width: 200px;
            font-size: 13px;
            line-height: 1.5;
            border-radius: 5px;
        }
        .info-window h4 { margin: 0 0 5px 0; font-size: 15px; color: #000; }
        .info-window p { margin: 0; color: #555; }
        .info-window .tel { color: #007bff; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <div class="tabs">
                <button id="tab-indoor" class="tab-btn active" onclick="searchTab('실내 체육', 'CT1', this)">🏠 실내 체육 시설</button>
                <button id="tab-outdoor" class="tab-btn" onclick="searchTab('실외 체육', 'CT1', this)">🌳 실외 체육 시설</button>
            </div>

            <div class="search-box">
                <input type="text" id="keyword" placeholder="추가 검색어를 입력하세요" onkeypress="if(event.key === 'Enter') searchPlaces()">
                <button onclick="searchPlaces()">검색</button>
            </div>
            
            <ul id="placesList" class="result-list"></ul>
        </div>

        <div class="right-panel">
            <div id="map"></div>
        </div>
    </div>

    <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=230193b2e6b56302aaedb904f915425f&libraries=services&autoload=false"></script>
    
    <script>
        // 전역 변수 설정
        let map; 
        let ps; 
        let infowindow; 
        let markers = []; // 검색 결과 마커 배열
        let myLocationMarker = null; // 내 현재 위치 마커를 별도로 보관 (초기화 방지)
        let myLocationInfoWindow = null; 

        // 지도가 완벽히 로드된 후 실행
        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map'); 
            
            const defaultPosition = new kakao.maps.LatLng(37.566826, 126.9786567);
            const mapOptions = {
                center: defaultPosition, 
                level: 5 
            };  

            map = new kakao.maps.Map(mapContainer, mapOptions); 
            ps = new kakao.maps.services.Places(); 
            infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

            // [기능 추가] 내 현재 위치 표시 
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const currentPosition = new kakao.maps.LatLng(lat, lon);
                    
                    map.panTo(currentPosition); 
                    
                    // 내 위치 전용 마커 생성
                    myLocationMarker = new kakao.maps.Marker({
                        map: map,
                        position: currentPosition
                    });

                    // 내 위치 표시 라벨
                    myLocationInfoWindow = new kakao.maps.InfoWindow({
                        content: '<div style="padding:5px; font-weight:bold; font-size:13px; color:red; text-align:center;">🔴 내 현재 위치</div>'
                    });
                    myLocationInfoWindow.open(map, myLocationMarker);

                    // 위치를 찾은 후 기본 탭(실내 체육시설) 검색 실행
                    searchTab('실내 체육', 'CT1', document.getElementById('tab-indoor'));

                }, function(error) {
                    console.warn("위치 권한을 거부했거나 가져올 수 없어 기본 위치(서울)로 시작합니다.");
                    searchTab('실내 체육', 'CT1', document.getElementById('tab-indoor'));
                });
            } else {
                searchTab('실내 체육', 'CT1', document.getElementById('tab-indoor'));
            }
        });

        // 탭 버튼 클릭 시 실행되는 함수
        function searchTab(keyword, categoryCode, element) {
            // 탭 디자인 활성화 변경
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');

            // 탭에 맞는 키워드와 CT1 카테고리를 조합하여 검색 (현재 지도 중심 기준)
            const searchOptions = {
                category_group_code: categoryCode,
                location: map.getCenter()
            };
            ps.keywordSearch(keyword, placesSearchCallback, searchOptions); 
        }

        // 검색 버튼 클릭 시 실행 (자유 검색)
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;
            if (!keyword.trim()) {
                alert('검색어를 입력해주세요!');
                return;
            }
            
            // 자유 검색은 탭 디자인 비활성화 후 검색
            document.querySelectorAll('.tab-btn').forEach(tab => tab.classList.remove('active'));
            ps.keywordSearch(keyword, placesSearchCallback); 
        }

        // 장소 검색 결과 콜백
        function placesSearchCallback(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('주변에 검색 결과가 존재하지 않습니다.');
                clearResults(); // 결과가 없으면 리스트와 마커 지우기
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 중 오류가 발생했습니다.');
            }
        }

        // 검색 결과 화면 초기화 함수
        function clearResults() {
            document.getElementById('placesList').innerHTML = '';
            removeMarkers();
            infowindow.close();
        }

        // 검색 결과를 화면에 표시
        function displayPlaces(places) {
            const listEl = document.getElementById('placesList');
            const bounds = new kakao.maps.LatLngBounds(); 

            clearResults(); // 기존 탭 데이터 및 마커 삭제 (내 위치 마커는 유지됨)

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                const marker = addMarker(placePosition);
                bounds.extend(placePosition);

                const itemEl = createListItem(places[i]);

                // [기능 변경] 마커나 리스트 '클릭 시' 상세 팝업 표시
                (function(marker, place) {
                    // 마커 클릭 이벤트
                    kakao.maps.event.addListener(marker, 'click', () => {
                        displayInfowindow(marker, place);
                        map.panTo(placePosition); // 클릭 시 지도 중앙 이동
                    });

                    // 리스트 항목 클릭 이벤트
                    itemEl.onclick = () => {
                        displayInfowindow(marker, place);
                        map.panTo(placePosition);
                    };
                })(marker, places[i]);

                listEl.appendChild(itemEl);
            }
            
            // 내 위치 마커가 있다면 바운드에 포함
            if (myLocationMarker) {
                bounds.extend(myLocationMarker.getPosition());
            }

            map.setBounds(bounds);
        }

        // 검색 결과 HTML 생성
        function createListItem(place) {
            const el = document.createElement('li');
            let content = `<h5>${place.place_name}</h5>`;
            
            if (place.road_address_name) {
                content += `<p>${place.road_address_name}</p>`;
            } else {
                content += `<p>${place.address_name}</p>`;
            }
            
            if (place.phone) {
                content += `<p class="phone">📞 ${place.phone}</p>`;
            }

            el.innerHTML = content;
            return el;
        }

        // 마커 생성 및 배열 추가
        function addMarker(position) {
            const marker = new kakao.maps.Marker({
                position: position,
                map: map
            });
            markers.push(marker); 
            return marker;
        }

        // 기존 검색 마커 지우기 (내 위치 마커는 건드리지 않음)
        function removeMarkers() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null); 
            }
            markers = []; 
        }

        // [기능 변경] 상세 정보창(말풍선) 표시
        function displayInfowindow(marker, place) {
            // 이름, 주소, 전화번호가 들어간 상세 팝업 HTML
            const address = place.road_address_name || place.address_name;
            const phone = place.phone ? `<p class="tel">📞 ${place.phone}</p>` : '';
            
            const content = `
                <div class="info-window">
                    <h4>${place.place_name}</h4>
                    <p>${address}</p>
                    ${phone}
                </div>
            `;
            infowindow.setContent(content);
            infowindow.open(map, marker);
        }
    </script>
</body>
</html>
