<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* CSS: 기본 여백 제거 및 전체 화면 사용 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        }

        /* 2분할 레이아웃을 위한 Flexbox 설정 */
        .container {
            display: flex;
            height: 100vh; /* 화면 전체 높이 */
        }

        /* 왼쪽 패널 (검색창 + 리스트) */
        .left-panel {
            width: 350px; /* 고정 너비 */
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 2;
        }

        /* 검색 박스 디자인 */
        .search-box {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        .search-box button {
            padding: 10px 15px;
            background-color: #fee500; /* 카카오톡 노란색 느낌 */
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .search-box button:hover {
            background-color: #f4dc00;
        }

        /* 검색 결과 리스트 디자인 */
        .result-list {
            flex: 1;
            overflow-y: auto; /* 결과가 많으면 스크롤 생성 */
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .result-list li {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .result-list li:hover {
            background-color: #e9ecef;
        }

        .result-list h5 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: #333;
        }

        .result-list p {
            margin: 0 0 5px 0;
            font-size: 13px;
            color: #666;
        }

        .result-list .phone {
            color: #28a745;
        }

        /* 오른쪽 패널 (지도) */
        .right-panel {
            flex: 1; /* 남은 영역을 모두 차지 */
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <div class="search-box">
                <input type="text" id="keyword" placeholder="장소를 검색해보세요" onkeypress="if(event.key === 'Enter') searchPlaces()">
                <button onclick="searchPlaces()">검색</button>
            </div>
            <ul id="placesList" class="result-list"></ul>
        </div>

        <div class="right-panel">
            <div id="map"></div>
        </div>
    </div>

    <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=230193b2e6b56302aaedb904f915425f&libraries=services&autoload=false"></script>
    
    <script>
        // 전역 변수 설정
        let map; // 지도 객체를 담을 변수
        let ps; // 장소 검색 객체를 담을 변수
        let infowindow; // 마커 클릭 시 띄울 정보창 객체
        let markers = []; // 지도에 표시된 마커들을 관리할 배열

        // 지도가 완벽히 로드된 후 실행 (autoload=false 일 때 필수 설정)
        kakao.maps.load(function() {
            // 1. 지도를 표시할 HTML 요소 선택
            const mapContainer = document.getElementById('map'); 
            
            // 2. 기본 지도 옵션 (위치 권한 거부 시 서울시청 기준)
            const defaultPosition = new kakao.maps.LatLng(37.566826, 126.9786567);
            const mapOptions = {
                center: defaultPosition, 
                level: 5 // 요청하신 지도 확대 레벨 5 설정
            };  

            // 3. 지도 생성
            map = new kakao.maps.Map(mapContainer, mapOptions); 

            // 4. 장소 검색 객체(ps)와 정보창(infowindow) 초기화
            ps = new kakao.maps.services.Places(); 
            infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

            // 5. 페이지가 열리면 사용자의 위치 권한을 요청하고 지도를 이동
            if (navigator.geolocation) {
                // 권한을 허용하면 현재 위치의 위도, 경도를 가져옴
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude; // 위도
                    const lon = position.coords.longitude; // 경도
                    
                    const currentPosition = new kakao.maps.LatLng(lat, lon);
                    
                    // 지도의 중심을 현재 위치로 부드럽게 이동
                    map.panTo(currentPosition); 
                    
                    // (선택 사항) 현재 위치에 마커 표시
                    new kakao.maps.Marker({
                        map: map,
                        position: currentPosition
                    });
                }, function(error) {
                    console.warn("위치 권한을 거부했거나 가져올 수 없어 기본 위치(서울)로 시작합니다.");
                });
            }
        });

        // 사용자가 검색 버튼을 누르거나 엔터를 쳤을 때 실행되는 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.trim()) {
                alert('검색어를 입력해주세요!');
                return;
            }

            // 카카오 장소 검색 API 호출 (키워드, 콜백함수)
            ps.keywordSearch(keyword, placesSearchCallback); 
        }

        // 장소 검색이 완료된 후 결과를 처리하는 콜백 함수
        function placesSearchCallback(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                // 검색이 성공하면 화면에 결과를 표시
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 존재하지 않습니다.');
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 결과 중 오류가 발생했습니다.');
            }
        }

        // 검색 결과를 화면 왼쪽 리스트와 오른쪽 지도(마커)에 표시하는 함수
        function displayPlaces(places) {
            const listEl = document.getElementById('placesList');
            const bounds = new kakao.maps.LatLngBounds(); // 지도 범위를 재설정하기 위한 객체

            // 기존에 있던 리스트와 지도 마커 초기화
            listEl.innerHTML = '';
            removeMarkers();

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                
                // 지도에 마커 생성
                const marker = addMarker(placePosition);
                
                // 검색된 장소들을 모두 포함할 수 있도록 영역 확장
                bounds.extend(placePosition);

                // 왼쪽 패널에 들어갈 HTML 요소(li) 생성
                const itemEl = createListItem(places[i]);

                // 마우스 이벤트 (마커나 리스트 항목에 마우스를 올리면 정보창 표시)
                (function(marker, title) {
                    // 마커 이벤트
                    kakao.maps.event.addListener(marker, 'mouseover', () => displayInfowindow(marker, title));
                    kakao.maps.event.addListener(marker, 'mouseout', () => infowindow.close());

                    // 리스트 항목 이벤트
                    itemEl.onmouseover = () => displayInfowindow(marker, title);
                    itemEl.onmouseout = () => infowindow.close();
                    
                    // 리스트 항목을 클릭하면 해당 위치로 지도 중심 이동
                    itemEl.onclick = () => {
                        map.panTo(placePosition);
                    };
                })(marker, places[i].place_name);

                // 리스트에 항목 추가
                listEl.appendChild(itemEl);
            }

            // 검색된 모든 장소가 보이도록 지도 범위 재설정
            map.setBounds(bounds);
        }

        // 검색 결과 항목의 HTML(<li>)을 만드는 함수
        function createListItem(place) {
            const el = document.createElement('li');
            let content = `<h5>${place.place_name}</h5>`;
            
            // 도로명 주소가 있으면 도로명 우선 표시, 없으면 지번 주소 표시
            if (place.road_address_name) {
                content += `<p>${place.road_address_name}</p>`;
            } else {
                content += `<p>${place.address_name}</p>`;
            }
            
            // 전화번호가 있으면 표시
            if (place.phone) {
                content += `<p class="phone">${place.phone}</p>`;
            }

            el.innerHTML = content;
            return el;
        }

        // 지도에 마커를 생성하고 배열에 저장하는 함수
        function addMarker(position) {
            const marker = new kakao.maps.Marker({
                position: position,
                map: map
            });
            markers.push(marker); // 나중에 지우기 위해 배열에 보관
            return marker;
        }

        // 지도에서 기존 마커들을 모두 지우는 함수
        function removeMarkers() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null); // 지도에서 제거
            }
            markers = []; // 배열 비우기
        }

        // 정보창(말풍선)을 띄우는 함수
        function displayInfowindow(marker, title) {
            const content = `<div style="padding:5px;z-index:1;font-size:13px;border-radius:4px;">${title}</div>`;
            infowindow.setContent(content);
            infowindow.open(map, marker);
        }
    </script>
</body>
</html>
